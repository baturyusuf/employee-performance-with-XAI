{
  "evaluation": {
    "default_cv": {
      "strategy": "StratifiedKFold",
      "n_splits": 10,
      "shuffle": true,
      "seed": 42
    },
    "bootstrap": {
      "n_boot": 5000,
      "confidence_level": 0.95,
      "seed": 42
    },
    "statistical_tests": {
      "paired_test": "wilcoxon_signed_rank",
      "multiple_comparison_correction": "holm",
      "alpha": 0.05
    },
    "primary_metrics": [
      "macro_f1",
      "quadratic_weighted_kappa",
      "ordinal_mae",
      "severe_error_rate",
      "ece_confidence",
      "multiclass_brier"
    ],
    "calibration_bins": 10
  }
}
