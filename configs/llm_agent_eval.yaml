        "feature_policy": "no_salary_hike_no_attrition_no_department",
        "model_name": "xgboost",
        "prediction_path": "reports/calibration/final_candidates/calibration_predictions.csv",
        "reason_code_dir": "reports/xai/final_candidates/reason_code_examples",
        "shap_representative_path": "reports/leakage_safe/xgboost_no_salary_hike_no_attrition_no_department/shap/representative_cases.csv"
      },
      {
        "dataset_name": "hrdataset_v14",
        "enabled": true,
        "source": "external",
        "role": "external_performance_replication",
        "target_kind": "primary",
        "sample_size": 20,
        "feature_policy": "department_free",
        "model_name": "xgboost",
        "report_dir": "reports/external_validation/hrdataset_v14"
      },
      {
        "dataset_name": "ibm_hr_analytics",
        "enabled": true,
        "source": "external",
        "role": "restricted_target_robustness",
        "target_kind": "primary",
        "sample_size": 10,
        "feature_policy": "department_free",
        "model_name": "xgboost",
        "report_dir": "reports/external_validation/ibm_hr_analytics"
      },
      {
        "dataset_name": "ibm_hr_analytics_attrition",
        "enabled": true,
        "source": "external",
