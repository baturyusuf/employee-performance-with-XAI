{
  "llm_agent_eval": {
    "seed": 42,
    "run_id_prefix": "llm_agent_eval",
    "run_mode": "dry_run",
    "sampling_strategy": "stratified_risk_aware",
    "output_dir": "reports/llm_explanations",
