        "target_kind": "attrition",
        "sample_size": 10,
        "feature_policy": "department_free",
        "model_name": "xgboost",
        "report_dir": "reports/external_validation/ibm_hr_analytics_attrition"
      },
      {
        "dataset_name": "employee_turnover",
        "enabled": true,
        "source": "external",
        "role": "related_task_transfer",
        "target_kind": "primary",
        "sample_size": 10,
        "feature_policy": "without_last_evaluation",
        "model_name": "xgboost",
        "report_dir": "reports/external_validation/employee_turnover"
      }
    ]
